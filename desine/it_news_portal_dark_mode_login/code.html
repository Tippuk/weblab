<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>TechPortal | Login</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 md:px-10 py-3">
<div class="max-w-7xl mx-auto flex items-center justify-between gap-8">
<div class="flex items-center gap-8">
<a class="flex items-center gap-2 text-primary" href="#">
<span class="material-symbols-outlined text-3xl font-bold">terminal</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">TechPortal</h2>
</a>
<nav class="hidden lg:flex items-center gap-6">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">Feed</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">Hubs</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">Companies</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">Events</a>
</nav>
</div>
<div class="flex flex-1 justify-end items-center gap-4">
<div class="hidden md:flex relative w-full max-w-xs">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary placeholder:text-slate-500" placeholder="Search articles, tags..." type="text"/>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-primary transition-colors hover:bg-primary/10">
<span class="material-symbols-outlined fill-1">dark_mode</span>
</button>
<div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-800 mx-1"></div>
<a class="text-sm font-bold text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-primary transition-colors" href="#">Sign Up</a>
</div>
</div>
</div>
</header>
<main class="flex-1 w-full px-4 md:px-10 py-12 flex items-center justify-center">
<div class="w-full max-w-md bg-white dark:bg-slate-900/80 backdrop-blur-sm rounded-2xl border border-slate-200 dark:border-slate-800 p-8 md:p-10 shadow-2xl">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome back</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Log in to your professional IT network</p>
</div>
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<input class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2.5 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="email" placeholder="name@company.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2.5 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-lg transition-colors mt-4 shadow-lg shadow-primary/20" type="button">
                    Sign In
                </button>
</form>
<p class="text-center mt-10 text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? <a class="text-primary font-semibold hover:underline" href="#">Sign up</a>
</p>
</div>
</main>
</div>

</body></html>
